<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Customer orders</title>

    <link rel="stylesheet" href="../../dist/styles/output.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>

<body class="min-h-screen bg-linear-to-b from-indigo-300 via-purple-300 to-pink-300">
    <!-- Admin Navbar -->
    <div id="adminnavbar" class="w-full fixed top-0 left-0 z-50"></div>

    <!-- MAIN CONTAINER -->
    <div class="pt-28 px-4 flex justify-center">

        <div class="w-full max-w-6xl bg-white/30 backdrop-blur-lg rounded-xl shadow-xl p-6">


            <!-- TITLE -->
            <h1 class="text-2xl md:text-3xl font-bold text-center mb-6 text-black">
                Customer Orders
            </h1>


            <!-- TABLE -->
            <div class="overflow-x-auto">

                <table class="min-w-full bg-white rounded-lg shadow text-sm">

                    <thead class="">

                        <tr>
                            <th class="p-3 text-left">Customer ID</th>
                            <th class="p-3 text-left">Customer Name</th>
                            <th class="p-3 text-left">Date</th>
                            <th class="px-4 text-left">Product Name</th>
                            <th class="p-3 text-left">Items</th>
                            <th class="p-3 text-left">Quantity</th>
                            <th class="p-3 text-left">Amount</th>
                            <th class="p-3 text-left">Payment</th>
                        </tr>

                    </thead>

                    <tbody id="ordersTable" class="divide-y">

                        

                    </tbody>

                </table>

            </div>


        </div>

    </div>



    <script type="module" src="../../dist/scripts/admin_customer_order.js"></script>

    <script type="module" src="../../dist/components/admin_navbar_loader.js"></script>
</body>

</html>
