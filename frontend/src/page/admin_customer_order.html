<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Customer Orders</title>

    <link rel="stylesheet" href="../../dist/styles/output.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>

<body class="min-h-screen bg-linear-to-b from-indigo-300 via-purple-300 to-pink-300">

    <!-- Navbar -->
    <div id="adminnavbar" class="w-full fixed top-0 left-0 z-50"></div>

    <!-- MAIN -->
    <div class="pt-28 px-4 flex justify-center">

        <div class="w-full max-w-7xl bg-white backdrop-blur-lg rounded-xl shadow-xl p-6">

            <!-- TITLE -->
            <h1 class="text-2xl md:text-3xl font-bold text-center mb-6 text-black underline">
                Customer Orders
            </h1>

            <!-- TABLE -->
            <div class="overflow-x-auto">

                <table class="min-w-full text-xs md:text-sm bg-white rounded-lg ">

                    <thead>
                        <tr class="bg-gray-100 rounded-lg">

                            <th class="p-3 text-left">Customer ID</th>
                            <th class="p-3 text-left">Customer Name</th>
                            <th class="p-3 text-left">Date</th>
                            <th class="p-3 text-left">Product Name</th>
                            <th class="p-3 text-left">Items</th>
                            <th class="p-3 text-left">Quantity</th>
                            <th class="p-3 text-left">Amount</th>
                            <th class="p-3 text-left">Payment</th>
                            <th class="p-3 text-left">Status</th>
                            <th class="p-3 text-left">Address</th>
                            <th class="p-3 text-left">Phone</th>

                        </tr>
                    </thead>

                    <tbody id="ordersTable" class="divide-y text-black">
                        <!-- Data will come from TS -->
                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <!-- Scripts -->
    <script type="module" src="../../dist/scripts/admin_customer_order.js"></script>
    <script type="module" src="../../dist/components/admin_navbar_loader.js"></script>

</body>

</html>
