<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="../../dist/styles/output.css">

</head>

<body class="min-h-screen bg-gradient-to-b from-indigo-300 via-purple-300 to-pink-300">

    <!-- Navbar -->
    <div id="adminnavbar" class="w-full fixed top-0 left-0 z-50"></div>

    <div class="flex min-h-screen pt-20">

        <!-- Sidebar -->
        <div class="w-64 shadow-xl p-6">
            <nav class="space-y-4 text-black font-semibold pt-20 pl-6">
                <a href="./admin_customer_order.html" class="block hover:text-white">
                    Orders
                </a>
            </nav>
        </div>

        <!-- Main -->
        <div class="flex-1 p-6 md:p-10">

            <!-- Header -->
            <div class="text-center mb-10">
                <h1 class="text-3xl font-bold text-black">
                    Dashboard Overview
                </h1>
            </div>

            <!-- Cards -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-2 gap-6">

                <div class="bg-white shadow-md rounded-xl text-center p-6">
                    <p>Total Users</p>
                    <p id="totalusers" class="text-3xl font-bold mt-2">0</p>
                </div>

                <div class="bg-white shadow-md rounded-xl text-center p-6">
                    <p>Total Admins</p>
                    <p id="totaladmins" class="text-3xl font-bold mt-2">0</p>
                </div>


                <div class="bg-white shadow-md rounded-xl text-center p-6">
                    <p>Total Customers</p>
                    <p id="totalcustomers" class="text-3xl font-bold mt-2">0</p>
                </div>

                <div class="bg-white shadow-md rounded-xl text-center p-6">
                    <p> Total Products</p>
                    <p id="totalproducts" class="text-3xl font-bold mt-2">0</p>
                </div>

                <div class="bg-white shadow-md rounded-xl text-center p-6">
                    <p> Total Orders</p>
                    <p id="totalorders" class="text-3xl font-bold mt-2">0</p>
                </div>

                <div class="bg-white shadow-md rounded-xl text-center p-6">
                    <p>Total Revenue</p>
                    <p id="totalrevenue" class="text-3xl font-bold mt-2">₹0</p>
                </div>

                <div class="bg-white shadow-md rounded-xl text-center p-6">
                    <p class="text-green-600">Paid Revenue</p>
                    <p id="paidrevenue" class="text-3xl font-bold mt-2">₹0</p>
                </div>

                <div class="bg-white shadow-md rounded-xl text-center p-6">
                    <p class="text-red-600">Pending Revenue</p>
                    <p id="pendingrevenue" class="text-3xl font-bold mt-2">₹0</p>
                </div>

            </div>

        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="../../dist/scripts/admin_dashboard.js"></script>
    <script type="module" src="../../dist/components/admin_navbar_loader.js"></script>

</body>

</html>
