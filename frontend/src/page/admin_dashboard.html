<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Dashboard</title>

    <link rel="stylesheet" href="../../dist/styles/output.css">

</head>


<body class="min-h-screen bg-linear-to-b from-indigo-300 via-purple-300 to-pink-300">


    <!-- MAIN CONTAINER -->
    <div class="flex min-h-screen">


        <!-- SIDEBAR -->
        <div class="w-64 bg-white/20 backdrop-blur-lg shadow-xl p-6 hidden md:block">

            <h2 class="text-2xl font-bold text-white mb-8">
                Admin Panel
            </h2>

            <nav class="space-y-4 text-white font-semibold">

                <a href="admin_dashboard.html" class="block hover:text-yellow-300">
                    Dashboard
                </a>

                <a href="admin_product.html" class="block hover:text-yellow-300">
                    Products
                </a>

                <a href="#" class="block hover:text-yellow-300">
                    Orders
                </a>

                <a href="#" class="block hover:text-yellow-300">
                    Customers
                </a>

            </nav>

        </div>


        <!-- MAIN DASHBOARD -->
        <div class="flex-1 p-6 md:p-10">


            <!-- HEADER -->
            <div class="flex justify-between items-center mb-10">

                <h1 class="text-3xl font-bold text-white">
                    Dashboard Overview
                </h1>

                <div class="text-white font-semibold">
                    Admin
                </div>

            </div>


            <!-- STAT CARDS -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">


                <div class="bg-white/30 backdrop-blur-lg rounded-xl p-6 shadow-lg">

                    <p class="text-gray-700">Products</p>

                    <p id="totalproducts" class="text-3xl font-bold mt-2">
                        0
                    </p>

                </div>


                <div class="bg-white/30 backdrop-blur-lg rounded-xl p-6 shadow-lg">

                    <p class="text-gray-700">Orders</p>

                    <p id="totalorders" class="text-3xl font-bold mt-2">
                        0
                    </p>

                </div>


                <div class="bg-white/30 backdrop-blur-lg rounded-xl p-6 shadow-lg">

                    <p class="text-gray-700">Customers</p>

                    <p id="totalcustomers" class="text-3xl font-bold mt-2">
                        0
                    </p>

                </div>


                <div class="bg-white/30 backdrop-blur-lg rounded-xl p-6 shadow-lg">

                    <p class="text-gray-700">Revenue</p>

                    <p id="totalrevenue" class="text-3xl font-bold mt-2">
                        ₹0
                    </p>

                </div>

            </div>



            <!-- RECENT ORDERS -->
            <div class="mt-12 bg-white/30 backdrop-blur-lg rounded-xl shadow-lg p-6">

                <h2 class="text-xl font-bold mb-6">
                    Recent Orders
                </h2>


                <div class="overflow-x-auto">

                    <table class="min-w-full text-left">

                        <thead class="border-b">

                            <tr>

                                <th class="p-3">Customer</th>

                                <th class="p-3">Items</th>

                                <th class="p-3">Total</th>

                                <th class="p-3">Payment</th>

                                <th class="p-3">Date</th>

                            </tr>

                        </thead>


                        <tbody id="recentOrders"></tbody>

                    </table>

                </div>

            </div>


        </div>

    </div>


    <script type="module" src="../../dist/scripts/admin_dashboard.js"></script>

</body>

</html>
