<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Login</title>
   <link rel="stylesheet" href="../../dist/styles/output.css">
</head>

<body class="min-h-screen bg-linear-to-b from-indigo-300 via-purple-300 to-pink-300 ">



    <!-- importing customer nav bar through js -->
    <!-- <div id="customernavbar" class="w-full fixed top-0 left-0 z-50 "> </div> -->

    <!-- background image -->
        <!-- <div>
        <img src="/frontend/assets/images/background image.jpg" alt="background image"
            class="absolute inset-0 w-full h-full object-cover -z-10 brightness-75">
    </div> -->



    <!-- login -->

    <div class="flex items-center justify-center min-h-screen pt-24">

        <div class="bg-linear-to-b from-indigo-300 via-purple-300 to-pink-300 p-8 rounded-2xl shadow-lg w-full max-w-md">

            <h2 class="text-2xl font-bold text-center mb-6">Customer Login</h2>

            <form id="customerloginform" class="space-y-4">

                <div>
                    <label class="loginelement mb-1">Email</label>
                    <input type="email" id="email" placeholder="input email"  required class="w-full px-4 py-2 border rounded-xl" >
                </div>

                <div>
                    <label class="loginelement mb-1">Password</label>
                    <input type="password" id="password" placeholder="input password" required
                        class="w-full px-4 py-2 border rounded-xl" >
                   
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-xl">
                    Login
                </button>

            </form>

            <p class="text-center text-sm mt-4">
                Don't have an account?
                <a href="../../src/page/customer_registration.html" class="text-blue-600">
                    Sign Up
                </a>
            </p>


            <p class="text-center text-sm mt-2">
                <a href="../../index.html" class="text-blue-600 hover:text-black hover:text-lg">
                    Back to Home
                </a>
            </p>

        </div>

    </div>


   
    <script type="module" src="../../dist/scripts/customer_login.js"></script>
    <script type="module" src="../../dist/components/customer_navbar_loader.js"></script>
</body>

</html>
