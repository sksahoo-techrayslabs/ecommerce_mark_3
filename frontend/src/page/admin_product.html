<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Product Management</title>

    <link rel="stylesheet" href="../../dist/styles/output.css">

</head>


<body class="min-h-screen bg-linear-to-b from-indigo-300 via-purple-300 to-pink-300 pt-20">

    <!-- Admin Navbar -->
    <div id="adminnavbar" class="w-full fixed top-0 left-0 z-50"></div>


    <div class="flex justify-center px-4 py-12">

        <div
            class="w-full max-w-6xl p-6 md:p-8 rounded-2xl bg-linear-to-b from-indigo-300 via-purple-300 to-pink-300 shadow-2xl ">

            <!-- ------------------------------ -->
            <!-- heading of the page -->
            <div class="text-center mb-8">
                <h1 class="text-2xl md:text-3xl font-bold underline">
                    Manage Products
                </h1>
            </div>

            <!-- ------------------------------------------------ -->
            <!-- product from-->
            <form id="productform" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-6       ">

                <input id="pid" type="text" placeholder="Product ID" required
                    class="border px-3 py-2 rounded-xl w-full text-center">

                <input id="category" type="text" placeholder="Category" required
                    class="border px-3 py-2 rounded-xl w-full text-center">

                <input id="productname" type="text" placeholder="Product Name" required
                    class="border px-3 py-2 rounded-xl w-full text-center">

                <input id="price" type="number" placeholder="Price" required
                    class="border px-3 py-2 rounded-xl w-full text-center">

                <input id="stock" type="number" placeholder="Stock" required
                    class="border px-3 py-2 rounded-xl w-full text-center">

                <input type="file" id="image" accept="image/*" class="border px-3 py-2 rounded-xl w-full">

                <button type="submit" class=" bg-blue-600 text-white rounded-xl px-4 py-2 hover:bg-black text-center">
                    Add Product
                </button>

            </form>

            <!-- ----------------------------------------------------------------------------------------------- -->
            <!-- search bar -->
            <div class="mb-6 flex justify-center">

                <input type="text" id="searchProduct" placeholder="Search product by name or category..."
                    class="border p-3 rounded-xl w-lg text-center ">

            </div>


            <!-- TABLE WRAPPER (RESPONSIVE SCROLL) -->
            <div class="overflow-x-auto ">

                <table class="min-w-full text-left rounded-lg bg-linear-to-b from-indigo-300 via-purple-300 to-pink-300 ">

                    <thead class="bg-white text-sm md:text-base">

                        <tr>

                            <th class="p-3">ID</th>

                            <th class="p-3">Image</th>

                            <th class="p-3">Category</th>

                            <th class="p-3">Product Name</th>

                            <th class="p-3">Price</th>

                            <th class="p-3">Stock</th>

                            <th class="px-9">Actions</th>

                        </tr>

                    </thead>

                    <tbody id="producttable" class="divide-y text-sm md:text-base">
                    </tbody>

                </table>

            </div>


        </div>

    </div>


    <!-- Scripts -->
    <script type="module" src="../../dist/components/admin_navbar_loader.js"></script>

    <script type="module" src="../../dist/scripts/admin_product.js"></script>

</body>

</html>
