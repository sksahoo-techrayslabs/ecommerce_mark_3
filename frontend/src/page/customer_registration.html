<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>customer registration</title>
    <link rel="stylesheet" href="../../dist/styles/output.css">
</head>

<body class="bg-gray-300 flex items-center justify-center min-h-screen pt-20">

    <!-- background image -->
    <div>
        <img src="/frontend/assets/images/background image.jpg" alt="vacground images"
            class="absolute inset-0 w-full h-full object-cover -z-10 brightness-75">
    </div>


    <!-- importing admin nav bar through js -->
    <!-- <div id="customernavbar" class="w-full fixed top-0 left-0 z-50 rounded-full"> -->

    </div>

    <div class="bg-white p-8 rounded-2xl shadow-lg w-96">

        <h2 class="text-2xl font-bold text-center mb-6">User Signup</h2>

        <form id="customersignupform" class="space-y-4">


            <div>
                <label class="block text-gray-700 mb-1">Full Name</label>
                <input type="text" id="name" placeholder="Enter your full name" required
                    class="w-full px-4 py-2 border rounded-xl " >
            </div>


            <div>
                <label class="block text-gray-700 mb-1">Email</label>
                <input type="email" id="email" placeholder="Enter your email" required
                    class="w-full px-4 py-2 border rounded-xl " >
            </div>


            <div>
                <label class="block text-gray-700 mb-1">Password</label>
                <input type="password" id="password" placeholder="Create password" required
                    class="w-full px-4 py-2 border rounded-xl " >
            </div>


            <div>
                <label class="block text-gray-700 mb-1">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm password" required
                    class="w-full px-4 py-2 border rounded-xl " >
            </div>


            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-xl hover:bg-blue-700">
                Sign Up
            </button>

        </form>


        <p class="text-center text-sm mt-4">
            Already have an account?
            <a href="../../src/page/customer_login.html"
                class="text-blue-600 hover:text-lg hover:text-black">
                Login
            </a>
        </p>


        <p class="text-center text-sm mt-2">
            <a href="../../index.html" class="text-blue-600 hover:text-lg hover:text-black">
                Back to Home
            </a>
        </p>

    </div>

    <script type="module" src="../../dist/scripts/customer_registartion.js"></script>
    <script type="module" src="../../dist/components/customer_navbar_loader.js"></script>
</body>

</html>
